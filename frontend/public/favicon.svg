<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#D9541E"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Inner top highlight (glass feel) -->
  <rect x="2" y="2" width="28" height="13" rx="5.5" fill="white" fill-opacity="0.10"/>

  <!-- Chain-link: left C-shape (opens right) -->
  <path d="M14 22H10A6 6 0 0 1 10 10H14"
        stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chain-link: right C-shape (opens left) -->
  <path d="M18 10H22A6 6 0 0 1 22 22H18"
        stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center connector bar -->
  <line x1="14" y1="16" x2="18" y2="16"
        stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
